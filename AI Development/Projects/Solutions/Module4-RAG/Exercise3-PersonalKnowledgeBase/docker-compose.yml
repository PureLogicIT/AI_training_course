version: "3.9"

volumes:
  ollama_data: {}
  chroma_data: {}

services:

  ollama:
    image: ollama/ollama:0.4.7
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  chromadb:
    image: chromadb/chroma:0.5.20
    environment:
      IS_PERSISTENT: "TRUE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  app:
    build: .
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    ports:
      - "7860:7860"
    depends_on:
      - ollama
      - chromadb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
