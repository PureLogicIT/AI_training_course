version: "3.9"

services:
  ollama:
    image: ollama/ollama:0.6.5
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: conversational-assistant
    ports:
      - "7860:7860"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - SESSIONS_DIR=/app/sessions
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
